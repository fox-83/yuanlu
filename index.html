<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>前端分类项目</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>前端项目结构</h1>
    <p>HTML、CSS、JavaScript 已分类存放。</p>
  </header>

  <main>
    <section class="card">
      <h2>说明</h2>
      <p>这是一个简单的前端项目模板，文件已按功能分类：</p>
      <ul>
        <li><strong>index.html</strong>：页面入口</li>
        <li><strong>css/style.css</strong>：样式文件</li>
        <li><strong>js/app.js</strong>：脚本文件</li>
        <li><strong>assets/</strong>：资产目录（图片、模型、字体等）</li>
      </ul>
    </section>

    <section class="card">
      <h2>运行方式</h2>
      <p>直接打开 <strong>index.html</strong> 或使用本地静态服务器查看页面。</p>
      <p>访问 <a href="model.html">model.html</a> 可加载无人机 glTF 模型并让螺旋桨旋转。</p>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
